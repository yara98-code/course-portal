{% extends 'base.html' %}

{% block content %}
<div class="text-center mb-5">
    <h2 class="fw-bold text-dark">Available Academic Programs</h2>
    <p class="text-muted">Choose your next milestone and accelerate your learning trajectory.</p>
</div>

<div id="offerings-container" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
    </div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    fetch("/api/offerings")
        .then(res => res.json())
        .then(data => {
            const container = document.getElementById("offerings-container");
            container.innerHTML = "";
            const icons = ["🌐", "💾", "🤖", "📊"];
            
            data.forEach((offering, idx) => {
                const icon = icons[idx % icons.length];
                const html = `
                    <div class="col">
                        <div class="card premium-card h-100 p-3 shadow-sm">
                            <div class="card-body d-flex flex-column justify-content-between">
                                <div>
                                    <div class="mb-3 fs-2">${icon}</div>
                                    <h5 class="fw-bold text-dark mb-2">${offering.title}</h5>
                                    <p class="text-muted small">${offering.description}</p>
                                </div>
                                <div>
                                    <button class="btn btn-subscribe w-100 py-2.5 mt-3 text-white fw-bold shadow-sm" 
                                            data-offering-id="${offering.id}" 
                                            style="background: #4f46e5; border: none; border-radius: 12px;">
                                        Subscribe Now
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML("beforeend", html);
            });

            document.querySelectorAll(".btn-subscribe").forEach((btn) => {
                btn.addEventListener("click", () => {
                    const offeringId = btn.dataset.offeringId;
                    if (offeringId) {
                        subscribeToOffering(offeringId, btn);
                    }
                });
            });
        })
        .catch(err => console.error("Error loading offerings:", err));
});
</script>
{% endblock %}
