{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center py-4">
    <div class="col-md-5">
        <div class="card auth-card p-4 shadow-sm" style="border: none; border-radius: 24px;">
            <h3 class="text-center fw-bold text-dark mb-4">Admin Access Portal</h3>
            <form method="POST" action="{{ url_for('register') }}">
                <div class="mb-3">
                    <label class="form-label fw-bold small text-secondary">Username</label>
                    <input type="text" name="email" class="form-control" placeholder="Enter Username (e.g. ADMIN)" style="border-radius: 12px; padding: 10px 15px;" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold small text-secondary">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" style="border-radius: 12px; padding: 10px 15px;" required>
                </div>
                <button type="submit" class="btn text-white w-100 py-2.5 fw-bold shadow-sm" style="background: #10b981; border: none; border-radius: 12px;">Submit Credentials</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
